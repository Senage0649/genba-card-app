<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>つまずきカード</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f5f7;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      line-height: 1.65;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 18px 80px;
      background: #ffffff;
      min-height: 100vh;
    }
    /* 画面ナビゲーション */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .nav-button {
      background: transparent;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #4a5568;
      text-decoration: none;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.08s ease;
    }
    .nav-button:active {
      background: #eef2f7;
    }
    .card-id {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    h1.title {
      font-size: 22px;
      line-height: 1.4;
      margin: 0 0 14px;
      font-weight: 700;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .tag {
      background: #eef2f7;
      color: #4a5568;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }
    /* 管理項目タグ（安全/工程/品質/原価）：補助情報 */
    .mgmt-section {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 28px;
    }
    .mgmt-label {
      font-size: 11px;
      color: #888;
      letter-spacing: 0.06em;
      margin-right: 2px;
    }
    .mgmt-tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid;
      font-weight: 500;
      white-space: nowrap;
    }
    .mgmt-tag::before {
      content: "•";
      margin-right: 4px;
    }
    .mgmt-tag-safety { color: #b91c1c; border-color: #fecaca; }
    .mgmt-tag-process { color: #1e40af; border-color: #bfdbfe; }
    .mgmt-tag-quality { color: #047857; border-color: #a7f3d0; }
    .mgmt-tag-cost { color: #b45309; border-color: #fde68a; }
    /* 用語解説カード用スタイル */
    .term-badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 10px;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .term-oneliner {
      background: #f0f7ff;
      border-left: 4px solid #2563eb;
      padding: 14px 16px;
      border-radius: 6px;
      margin-bottom: 26px;
    }
    .term-oneliner h2.section-title {
      color: #1e40af;
      margin-bottom: 6px;
    }
    .term-oneliner p {
      margin: 0;
      font-weight: 600;
      font-size: 16px;
      line-height: 1.55;
    }
    .term-caution {
      background: #fff5f5;
      border-left: 4px solid #c53030;
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 26px;
    }
    .term-caution h2.section-title {
      color: #c53030;
      margin-bottom: 6px;
    }
    .term-caution p {
      margin: 0;
      font-size: 14.5px;
      line-height: 1.6;
      color: #2d3748;
    }
    .term-ask {
      background: #f0fdf4;
      border-left: 4px solid #16a34a;
      padding: 14px 16px;
      border-radius: 6px;
      margin-top: 28px;
    }
    .term-ask h2.section-title {
      color: #166534;
      margin-bottom: 6px;
    }
    .term-ask p {
      margin: 0;
      font-weight: 500;
      font-size: 15px;
      line-height: 1.6;
    }
    section {
      margin-bottom: 26px;
    }
    h2.section-title {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.06em;
      margin: 0 0 10px;
      font-weight: 600;
    }
    /* 今やること3つ：最重要なので強調 */
    .actions-block {
      background: #fff8e7;
      border-left: 4px solid #f59e0b;
      padding: 14px 16px 14px 18px;
      border-radius: 6px;
      margin-bottom: 28px;
    }
    .actions-block h2.section-title {
      color: #92400e;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .actions-block ol {
      margin: 0;
      padding-left: 22px;
    }
    .actions-block ol li {
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 15.5px;
    }
    .actions-block ol li:last-child {
      margin-bottom: 0;
    }
    /* 通常リスト */
    ul.plain {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    ul.plain li {
      padding: 9px 0;
      border-bottom: 1px solid #eee;
      font-size: 15px;
    }
    ul.plain li:last-child {
      border-bottom: none;
    }
    /* テンプレートカード（聞き方・指示） */
    .template-card {
      background: #f0f7ff;
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 8px;
      font-size: 15px;
      line-height: 1.55;
    }
    .template-card:last-child {
      margin-bottom: 0;
    }
    /* 警告系：怒られるポイント・NG行動 */
    .warning-block {
      background: #fff5f5;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 12px;
    }
    .warning-block h2.section-title {
      color: #c53030;
    }
    .warning-block ul.plain li {
      border-bottom: 1px solid #fed7d7;
      color: #2d3748;
      font-size: 14.5px;
    }
    .warning-block ul.plain li:last-child {
      border-bottom: none;
    }
    /* 一言まとめ */
    .summary-block {
      background: #f0fdf4;
      border-left: 4px solid #16a34a;
      padding: 14px 16px;
      border-radius: 6px;
      margin-top: 32px;
    }
    .summary-block h2.section-title {
      color: #166534;
      margin-bottom: 6px;
    }
    .summary-block p {
      margin: 0;
      font-weight: 500;
      font-size: 15px;
      line-height: 1.6;
    }
    /* エラー表示 */
    .error {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    .error code {
      display: block;
      margin-top: 12px;
      padding: 10px;
      background: #f4f5f7;
      border-radius: 4px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <button class="nav-button" onclick="history.back()">← 戻る</button>
      <a class="nav-button" href="home.html">ホーム</a>
    </nav>
    <div id="root">
      <div class="error">読み込み中...</div>
    </div>
  </div>

  <script>
    // クエリパラメータからカードID取得（未指定なら 001）
    const params = new URLSearchParams(location.search);
    // 大文字小文字どちらでも一致するように正規化（例：t01 → T01）
    const cardId = (params.get('id') || '001').toUpperCase();

    fetch('../data/cards.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(cards => {
        const card = cards.find(c => c.id.toUpperCase() === cardId);
        if (!card) {
          showError(`カード ${cardId} が見つかりません`);
          return;
        }
        render(card);
        document.title = `${card.id} ${card.title}`;
      })
      .catch(err => {
        showError(
          'データの読み込みに失敗しました。<br>' +
          'プロジェクトルートで <code>python3 -m http.server</code> を実行してから' +
          '<code>http://localhost:8000/app/</code> を開いてください。'
        );
        console.error(err);
      });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function plainList(items) {
      const lis = items.map(i => `<li>${escapeHtml(i)}</li>`).join('');
      return `<ul class="plain">${lis}</ul>`;
    }

    function templateList(items) {
      return items.map(i => `<div class="template-card">${escapeHtml(i)}</div>`).join('');
    }

    // 管理項目タグの表示クラス対応表
    const MGMT_CLASS = {
      '安全管理': 'mgmt-tag-safety',
      '工程管理': 'mgmt-tag-process',
      '品質管理': 'mgmt-tag-quality',
      '原価管理': 'mgmt-tag-cost'
    };

    function mgmtTagsHtml(tags) {
      if (!tags || tags.length === 0) return '';
      const items = tags.map(t => {
        const cls = MGMT_CLASS[t] || '';
        return `<span class="mgmt-tag ${cls}">${escapeHtml(t)}</span>`;
      }).join('');
      return `
        <div class="mgmt-section">
          <span class="mgmt-label">管理項目</span>
          ${items}
        </div>
      `;
    }

    // 用語解説カード専用レンダラ
    function renderTermCard(card) {
      const tagsHtml = (card.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
      const html = `
        <div class="term-badge">用語解説</div>
        <div class="card-id">No. ${escapeHtml(card.id)}</div>
        <h1 class="title">${escapeHtml(card.title)}</h1>

        <div class="tags">
          ${tagsHtml}
        </div>

        ${mgmtTagsHtml(card.managementTags)}

        <section class="term-oneliner">
          <h2 class="section-title">ひとことで</h2>
          <p>${escapeHtml(card.termOneLiner || '')}</p>
        </section>

        <section>
          <h2 class="section-title">現場で言われる言い方</h2>
          ${plainList(card.termExpressions || [])}
        </section>

        <section>
          <h2 class="section-title">まず確認すること</h2>
          ${plainList(card.termFirstChecks || [])}
        </section>

        <section class="term-caution">
          <h2 class="section-title">注意</h2>
          <p>${escapeHtml(card.termCaution || '')}</p>
        </section>

        <section class="term-ask">
          <h2 class="section-title">聞き方</h2>
          <p>${escapeHtml(card.termAskTemplate || '')}</p>
        </section>
      `;
      document.getElementById('root').innerHTML = html;
    }

    function render(card) {
      // 用語解説カードは別レイアウトで描画
      if (card.cardType === 'term') {
        renderTermCard(card);
        return;
      }
      const html = `
        <div class="card-id">No. ${escapeHtml(card.id)}</div>
        <h1 class="title">${escapeHtml(card.title)}</h1>

        <div class="tags">
          ${card.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
        </div>

        ${mgmtTagsHtml(card.managementTags)}

        <section class="actions-block">
          <h2 class="section-title">今やること3つ</h2>
          <ol>
            ${card.actions.map(a => `<li>${escapeHtml(a)}</li>`).join('')}
          </ol>
        </section>

        <section>
          <h2 class="section-title">まず見る資料</h2>
          ${plainList(card.materials)}
        </section>

        <section>
          <h2 class="section-title">誰に聞く？</h2>
          ${plainList(card.askWho)}
        </section>

        <section>
          <h2 class="section-title">聞き方テンプレ</h2>
          ${templateList(card.askTemplate)}
        </section>

        <section>
          <h2 class="section-title">職長への指示テンプレ</h2>
          ${templateList(card.foremanInstruction)}
        </section>

        <section class="warning-block">
          <h2 class="section-title">怒られるポイント</h2>
          ${plainList(card.scoldedPoints)}
        </section>

        <section class="warning-block">
          <h2 class="section-title">NG行動</h2>
          ${plainList(card.ngActions)}
        </section>

        <section class="summary-block">
          <h2 class="section-title">一言まとめ</h2>
          <p>${escapeHtml(card.summary)}</p>
        </section>
      `;
      document.getElementById('root').innerHTML = html;
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = `<div class="error">${msg}</div>`;
    }
  </script>
</body>
</html>
