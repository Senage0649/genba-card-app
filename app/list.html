<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>つまずきカード一覧</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f5f7;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      line-height: 1.6;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }
    /* 画面ナビゲーション */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .nav-button {
      background: transparent;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #4a5568;
      text-decoration: none;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.08s ease;
    }
    .nav-button:active {
      background: #eef2f7;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      padding: 0 4px;
    }
    .page-desc {
      color: #666;
      font-size: 14px;
      margin: 0 0 24px;
      padding: 0 4px;
      line-height: 1.55;
    }
    .count {
      color: #888;
      font-size: 12px;
      margin: 0 0 14px;
      padding: 0 4px;
      letter-spacing: 0.04em;
    }
    /* カードリンク */
    .card-link {
      display: block;
      background: #ffffff;
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      transition: transform 0.08s ease, box-shadow 0.08s ease;
    }
    .card-link:active {
      transform: scale(0.99);
      box-shadow: 0 0 0 rgba(0, 0, 0, 0);
      background: #fafbfc;
    }
    .card-no {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.45;
      margin: 0 0 10px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }
    .tag {
      background: #eef2f7;
      color: #4a5568;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .card-summary {
      color: #555;
      font-size: 13.5px;
      line-height: 1.55;
      margin: 0;
      /* 2〜3行で省略表示 */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      line-clamp: 3;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .error {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    .error code {
      display: block;
      margin-top: 12px;
      padding: 10px;
      background: #ffffff;
      border-radius: 4px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <button class="nav-button" onclick="history.back()">← 戻る</button>
      <a class="nav-button" href="home.html">ホーム</a>
    </nav>
    <h1 class="page-title">つまずきカード一覧</h1>
    <p class="page-desc">若手電気工事担当者が、現場で止まったときに見るカード一覧です。</p>
    <div id="root">
      <div class="error">読み込み中...</div>
    </div>
  </div>

  <script>
    fetch('../data/cards.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(cards => {
        // id 昇順で並べる（"001" < "002" の文字列ソートでも整合する）
        cards.sort((a, b) => a.id.localeCompare(b.id));
        render(cards);
      })
      .catch(err => {
        showError(
          'データの読み込みに失敗しました。<br>' +
          'プロジェクトルートで <code>python3 -m http.server</code> を実行してから' +
          '<code>http://localhost:8000/app/list.html</code> を開いてください。'
        );
        console.error(err);
      });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function render(cards) {
      const countHtml = `<div class="count">${cards.length} 枚</div>`;
      const cardsHtml = cards.map(c => `
        <a class="card-link" href="index.html?id=${encodeURIComponent(c.id)}">
          <div class="card-no">No. ${escapeHtml(c.id)}</div>
          <h2 class="card-title">${escapeHtml(c.title)}</h2>
          <div class="card-tags">
            ${c.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
          </div>
          <p class="card-summary">${escapeHtml(c.summary)}</p>
        </a>
      `).join('');
      document.getElementById('root').innerHTML = countHtml + cardsHtml;
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = `<div class="error">${msg}</div>`;
    }
  </script>
</body>
</html>
