<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>タグ検索</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f5f7;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      line-height: 1.6;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }
    /* 画面ナビゲーション */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .nav-button {
      background: transparent;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #4a5568;
      text-decoration: none;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.08s ease;
    }
    .nav-button:active {
      background: #eef2f7;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      padding: 0 4px;
    }
    .page-desc {
      color: #666;
      font-size: 14px;
      margin: 0 0 20px;
      padding: 0 4px;
      line-height: 1.55;
    }
    /* タグ一覧 */
    .tag-cloud {
      background: #ffffff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-chip {
      background: #eef2f7;
      color: #4a5568;
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s ease, color 0.1s ease, transform 0.08s ease;
      white-space: nowrap;
    }
    .tag-chip:active {
      transform: scale(0.97);
    }
    .tag-chip.selected {
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
    }
    .tag-chip .count {
      opacity: 0.7;
      margin-left: 4px;
      font-size: 11px;
    }
    .tag-chip.selected .count {
      opacity: 0.9;
    }
    /* 選択中ヘッダー */
    .results-header {
      padding: 0 4px;
      margin-bottom: 12px;
    }
    .results-label {
      font-size: 13px;
      color: #555;
      letter-spacing: 0.04em;
    }
    .results-label strong {
      color: #1a1a1a;
      font-size: 15px;
      margin: 0 4px;
    }
    /* カードリンク */
    .card-link {
      display: block;
      background: #ffffff;
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      transition: transform 0.08s ease, background 0.08s ease;
    }
    .card-link:active {
      transform: scale(0.99);
      background: #fafbfc;
    }
    .card-no {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.45;
      margin: 0 0 8px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .card-tags .tag-mini {
      background: #eef2f7;
      color: #4a5568;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .card-tags .tag-mini.active {
      background: #dbeafe;
      color: #1e40af;
    }
    .card-summary {
      color: #555;
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      padding: 30px 20px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
    .error {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    .error code {
      display: block;
      margin-top: 12px;
      padding: 10px;
      background: #ffffff;
      border-radius: 4px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <button class="nav-button" onclick="history.back()">← 戻る</button>
      <a class="nav-button" href="home.html">ホーム</a>
    </nav>
    <h1 class="page-title">タグ検索</h1>
    <p class="page-desc">工程・作業・困りごとのタグから、関連するカードを探せます。</p>
    <div id="root">
      <div class="error">読み込み中...</div>
    </div>
  </div>

  <script>
    // 初期選択タグ
    let selectedTag = '他業者調整';
    let allCards = [];
    let tagOrder = []; // [[tag, count], ...] sorted

    fetch('../data/cards.json')
      .then(r => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(cards => {
        allCards = cards;
        tagOrder = aggregateTags(cards);
        // 初期タグが存在しない場合は最多タグを選択
        if (!tagOrder.find(([t]) => t === selectedTag)) {
          selectedTag = tagOrder[0] ? tagOrder[0][0] : '';
        }
        render();
      })
      .catch(err => {
        showError(
          'データの読み込みに失敗しました。<br>' +
          'プロジェクトルートで <code>python3 -m http.server</code> を実行してから' +
          '<code>http://localhost:8000/app/tags.html</code> を開いてください。'
        );
        console.error(err);
      });

    function aggregateTags(cards) {
      const counts = new Map();
      for (const c of cards) {
        for (const t of c.tags) {
          counts.set(t, (counts.get(t) || 0) + 1);
        }
      }
      // 件数降順 → 同件数は五十音順（ja-JP localeCompare）
      const arr = Array.from(counts.entries());
      arr.sort((a, b) => {
        if (b[1] !== a[1]) return b[1] - a[1];
        return a[0].localeCompare(b[0], 'ja');
      });
      return arr;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function tagCloudHtml() {
      return tagOrder.map(([tag, count]) => {
        const sel = tag === selectedTag ? ' selected' : '';
        return `<button class="tag-chip${sel}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}<span class="count">${count}</span></button>`;
      }).join('');
    }

    function cardLinkHtml(card) {
      const tagsHtml = card.tags.map(t => {
        const active = t === selectedTag ? ' active' : '';
        return `<span class="tag-mini${active}">${escapeHtml(t)}</span>`;
      }).join('');
      return `
        <a class="card-link" href="index.html?id=${encodeURIComponent(card.id)}">
          <div class="card-no">No. ${escapeHtml(card.id)}</div>
          <h3 class="card-title">${escapeHtml(card.title)}</h3>
          <div class="card-tags">${tagsHtml}</div>
          <p class="card-summary">${escapeHtml(card.summary)}</p>
        </a>
      `;
    }

    function render() {
      const matched = allCards
        .filter(c => c.tags.includes(selectedTag))
        .sort((a, b) => a.id.localeCompare(b.id));

      const cloud = `<div class="tag-cloud">${tagCloudHtml()}</div>`;
      const header = `
        <div class="results-header">
          <span class="results-label">選択中：<strong>${escapeHtml(selectedTag)}</strong>（${matched.length} 枚）</span>
        </div>
      `;
      const list = matched.length
        ? matched.map(cardLinkHtml).join('')
        : `<div class="empty">該当するカードがありません</div>`;

      document.getElementById('root').innerHTML = cloud + header + list;
      attachTagHandlers();
    }

    function attachTagHandlers() {
      document.querySelectorAll('.tag-chip').forEach(btn => {
        btn.addEventListener('click', () => {
          const t = btn.getAttribute('data-tag');
          if (!t || t === selectedTag) return;
          selectedTag = t;
          render();
          // 選択タグ変更後、ページ上部にスクロール
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = `<div class="error">${msg}</div>`;
    }
  </script>
</body>
</html>
