<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>困りごと別入口</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: #f4f5f7;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      line-height: 1.6;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }
    /* 画面ナビゲーション */
    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .nav-button {
      background: transparent;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      color: #4a5568;
      text-decoration: none;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.08s ease;
    }
    .nav-button:active {
      background: #eef2f7;
    }
    .page-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 8px;
      padding: 0 4px;
    }
    .page-desc {
      color: #666;
      font-size: 14px;
      margin: 0 0 24px;
      padding: 0 4px;
      line-height: 1.55;
    }
    /* カテゴリブロック */
    .category {
      background: #ffffff;
      border-radius: 12px;
      padding: 18px 16px 8px;
      margin-bottom: 18px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
    }
    .category-header {
      padding: 0 4px 12px;
      border-bottom: 1px solid #eee;
      margin-bottom: 12px;
    }
    .category-label {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 4px;
      line-height: 1.4;
    }
    .category-desc {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
      margin: 0 0 6px;
    }
    .category-count {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    /* カテゴリ内のカードリスト */
    .card-link {
      display: block;
      padding: 12px 8px;
      border-bottom: 1px solid #f1f3f5;
      text-decoration: none;
      color: inherit;
      transition: background 0.08s ease;
    }
    .card-link:last-child {
      border-bottom: none;
    }
    .card-link:active {
      background: #f7f8fa;
    }
    .card-no {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.45;
      margin: 0 0 8px;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 6px;
    }
    .tag {
      background: #eef2f7;
      color: #4a5568;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .card-summary {
      color: #555;
      font-size: 13px;
      line-height: 1.5;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .error {
      padding: 40px 20px;
      text-align: center;
      color: #888;
    }
    .error code {
      display: block;
      margin-top: 12px;
      padding: 10px;
      background: #ffffff;
      border-radius: 4px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="nav-bar">
      <button class="nav-button" onclick="history.back()">← 戻る</button>
      <a class="nav-button" href="home.html">ホーム</a>
    </nav>
    <h1 class="page-title">困りごと別入口</h1>
    <p class="page-desc">今つまずいている内容から、見るべきカードを探せます。</p>
    <div id="root">
      <div class="error">読み込み中...</div>
    </div>
  </div>

  <script>
    Promise.all([
      fetch('../data/categories.json').then(r => {
        if (!r.ok) throw new Error('categories.json HTTP ' + r.status);
        return r.json();
      }),
      fetch('../data/cards.json').then(r => {
        if (!r.ok) throw new Error('cards.json HTTP ' + r.status);
        return r.json();
      })
    ])
      .then(([categories, cards]) => {
        const cardMap = new Map(cards.map(c => [c.id, c]));
        render(categories, cardMap);
      })
      .catch(err => {
        showError(
          'データの読み込みに失敗しました。<br>' +
          'プロジェクトルートで <code>python3 -m http.server</code> を実行してから' +
          '<code>http://localhost:8000/app/categories.html</code> を開いてください。'
        );
        console.error(err);
      });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function cardLinkHtml(card) {
      return `
        <a class="card-link" href="index.html?id=${encodeURIComponent(card.id)}">
          <div class="card-no">No. ${escapeHtml(card.id)}</div>
          <h3 class="card-title">${escapeHtml(card.title)}</h3>
          <div class="card-tags">
            ${card.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
          </div>
          <p class="card-summary">${escapeHtml(card.summary)}</p>
        </a>
      `;
    }

    function categoryHtml(cat, cardMap) {
      const cardsHtml = cat.cardIds
        .map(id => cardMap.get(id))
        .filter(Boolean)
        .map(cardLinkHtml)
        .join('');
      return `
        <section class="category">
          <div class="category-header">
            <h2 class="category-label">${escapeHtml(cat.label)}</h2>
            <p class="category-desc">${escapeHtml(cat.description)}</p>
            <div class="category-count">${cat.cardIds.length} 枚</div>
          </div>
          ${cardsHtml}
        </section>
      `;
    }

    function render(categories, cardMap) {
      const html = categories.map(c => categoryHtml(c, cardMap)).join('');
      document.getElementById('root').innerHTML = html;
    }

    function showError(msg) {
      document.getElementById('root').innerHTML = `<div class="error">${msg}</div>`;
    }
  </script>
</body>
</html>
